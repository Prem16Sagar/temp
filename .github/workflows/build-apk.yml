name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'index.html'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sync web app into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/index.html

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk batlist-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: batlist-debug-apk
          path: batlist-debug.apk
          if-no-files-found: error

      - name: Publish to "batlist-latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete batlist-latest --yes --cleanup-tag || true
          gh release create batlist-latest batlist-debug.apk \
            --title "Bat-List APK (latest)" \
            --notes "Installable debug build of the Batman to-do app. Download the .apk below and open it on your Android device (you may need to allow installs from unknown sources)."
